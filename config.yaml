# ─── RedShadow V2 Configuration File ───
# Developed by Galal Noaman – RedShadow_V2
# For educational and lawful use only.

domain:
  timeout: 20
  retries: 3
  delay: 2
  headers:
    User-Agent: "RedShadowBot/2.0 (+https://github.com/GalalNoaman/RedShadow_V2)"

bruteforce:
  threads: 30                   # Parallel DNS resolution threads
  dns_servers:
    - "8.8.8.8"
    - "1.1.1.1"
    - "9.9.9.9"
  timeout: 2                    # Per-resolve timeout (keep low for speed)
  wordlist: null                # null = use built-in. Set path to use SecLists

scan:
  nmap_ports: "21-25,53,80,443,8080,8443"
  nmap_args: "-sS -sV -T4 -Pn -n"   # Change -sS to -sT if not running as root
  max_threads: 12
  dns_servers:
    - "8.8.8.8"
    - "1.1.1.1"
    - "9.9.9.9"
    - "208.67.222.222"

passive:
  verify_ssl: false
  delay: 0.5

analyse:
  cve_source: "data/cve_map.json"
  deduplicate: true             # Remove duplicate CVE matches (fixes current bug)

report:
  include_cvss: true
  include_links: true
  theme: "dark"                 # Updated — HTML report is dark themed now

pipeline:
  skip_bruteforce: false        # Set true to always skip bruteforce stage
  stop_on_empty: true           # Abort pipeline if no subdomains found
  verbose: false

defaults:
  output_dir: "outputs"
  debug: false